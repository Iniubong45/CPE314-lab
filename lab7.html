<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events</title>
</head>
<body>
    <button id="btn">Click Me</button>
    <input type="text" id="input" placeholder="Type here">
    <script>
        document.getElementById("btn").addEventListener("click", function() {
            alert("Button clicked!");
        });

        document.getElementById("input").addEventListener("keyup", function(event) {
            console.log("Key pressed: " + event.key);
        });
    </script>
    <div id="box">Hover over me</div>

<script>
const box = document.getElementById("box");

box.addEventListener("mouseover", function () {
    box.style.backgroundColor = "deeppink";
});
</script>

<!--increment counter-->
<p id="count">0</p>

<script>
let counter = 0;

const button = document.getElementById("btn");
const display = document.getElementById("count");

button.addEventListener("click", function increase() {counter++;
    document.getElementById("count").innerHTML = counter;})
</script>
<form id="form">
    <label for="Email">Email:</label>
    <input type="text" id="email">
    <button type="submit">submit</button>
</form>    
<script>
    let email = document.getElementById("email");
    let form = document.getElementById("form");
    form.addEventListener("submit", function (event) {
    event.preventDefault();

    if (email.value.includes("@")) {
        alert("Valid Email!");
    } else {
        alert("Invalid Email! Please try again.");
        email.value = "";
        };
        

    })

</script>
<p id="text">Waiting...</p>

<script>
  setTimeout(function() {
    document.getElementById("text").textContent = "Time's up!";
  }, 5000);
</script>
<!--stop link from navigating-->
<a href="https://google.com" id="link">Click me</a>

<script>
  document.getElementById("link").addEventListener("click", function(e) {
    e.preventDefault();
    console.log("Link stopped!");
  });
</script>
</body>
</html>
